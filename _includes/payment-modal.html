<!-- ===== PAYMENT MODAL ===== -->
<div id="payment-modal" role="dialog" aria-modal="true" aria-labelledby="payment-modal-title" aria-hidden="true">
  <div class="pm-overlay" id="payment-modal-overlay"></div>
  <div class="pm-panel">
    <div class="pm-header">
      <div class="pm-header-text">
        <h2 id="payment-modal-title">Book Your Dumpster</h2>
        <p>Secure online booking &mdash; Dumpster Rental</p>
      </div>
      <button class="pm-close" id="close-payment-modal" aria-label="Close booking form">&times;</button>
    </div>
    <div class="pm-body">
      <div id="payment-form"></div>
    </div>
  </div>
</div>

<style>
/* ===== PAYMENT MODAL ===== */
#payment-modal {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
}
#payment-modal.is-open {
  pointer-events: all;
  opacity: 1;
}
.pm-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  cursor: pointer;
}

/* ===== DESKTOP ===== */
.pm-panel {
  position: relative;
  z-index: 1;
  background: #fff;
  border-radius: 16px;
  width: min(600px, 96vw);
  height: 92vh;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  transform: translateY(20px) scale(0.98);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}
#payment-modal.is-open .pm-panel {
  transform: translateY(0) scale(1);
}
.pm-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  padding: 1.5rem 1.5rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
  background: var(--clr-dark, #1e1b2e);
  color: #fff;
  border-radius: 16px 16px 0 0;
}
.pm-header-text h2 {
  font-size: 1.2rem;
  font-weight: 900;
  color: #fff;
  line-height: 1.2;
  margin: 0 0 0.25rem;
}
.pm-header-text p {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.65);
  margin: 0;
}
.pm-close {
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  min-width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  line-height: 1;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s ease;
  flex-shrink: 0;
}
.pm-close:hover { background: rgba(255,255,255,0.22); }
.pm-body {
  padding: 1.5rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}
#payment-form {
  min-height: 200px;
}
/* Force the injected iframe to fill available space */
#payment-form iframe {
  width: 100% !important;
  height: 750px !important;
  min-height: 750px !important;
  border: none !important;
  display: block !important;
}

/* ===== MOBILE — single scroll region ===== */
@media (max-width: 600px) {
  #payment-modal {
    align-items: flex-end;
  }

  /* Panel fills full screen, scrolls as one unit */
  .pm-panel {
    width: 100%;
    height: 100dvh;
    max-height: 100dvh;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    /* Single scroll: panel itself scrolls, not pm-body */
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: block; /* override flex so header sticks naturally */
  }

  #payment-modal.is-open .pm-panel {
    transform: translateY(0);
  }

  /* Header sticks to top as user scrolls through the form */
  .pm-header {
    position: sticky;
    top: 0;
    z-index: 10;
    border-radius: 20px 20px 0 0;
  }

  /* Body no longer needs its own scroll */
  .pm-body {
    overflow-y: visible;
    padding: 1.25rem 1rem 3rem;
  }

  /* Iframe taller on mobile to reduce clipping */
  #payment-form iframe {
    height: 800px !important;
    min-height: 800px !important;
  }
}
</style>

<script>
(function () {
  var modal       = document.getElementById('payment-modal');
  var modalTitle  = document.getElementById('payment-modal-title');
  var formWrap    = document.getElementById('payment-form');
  var closeBtn    = document.getElementById('close-payment-modal');
  var overlay     = document.getElementById('payment-modal-overlay');
  var lastTrigger = null;

  function forceIframeHeight() {
    var attempts = 0;
    var interval = setInterval(function () {
      var iframe = formWrap.querySelector('iframe');
      if (iframe) {
        iframe.style.setProperty('height', '750px', 'important');
        iframe.style.setProperty('min-height', '750px', 'important');
        iframe.style.setProperty('width', '100%', 'important');
        iframe.style.setProperty('border', 'none', 'important');
        clearInterval(interval);
      }
      if (++attempts > 40) clearInterval(interval);
    }, 100);
  }

  function loadGateway(optionsData, amount) {
    formWrap.innerHTML = '';
    var options = { data: optionsData, amount: amount, feeType: 'amount' };
    var init = function () {
      new PaymentGateway({ target: 'payment-form', options: options });
      forceIframeHeight();
    };
    if (typeof window.PaymentGateway === 'undefined') {
      window.webroot = 'https://dashboard.maverickpayments.com';
      var s = document.createElement('script');
      s.async = true;
      s.src = window.webroot + '/js/gateway/payment.js?v=' + Date.now();
      document.getElementsByTagName('head')[0].appendChild(s);
      s.onload = s.onreadystatechange = function () { init(); };
    } else {
      init();
    }
  }

  function openModal(trigger) {
    lastTrigger = trigger;
    var title   = trigger.getAttribute('data-title') || 'Book Your Dumpster';
    var amount  = trigger.getAttribute('data-amount');
    var optData = trigger.getAttribute('data-options');
    modalTitle.textContent = title;
    modal.setAttribute('aria-hidden', 'false');
    modal.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    // Scroll panel back to top on each open
    var panel = modal.querySelector('.pm-panel');
    if (panel) panel.scrollTop = 0;
    closeBtn.focus();
    loadGateway(optData, amount);
  }

  function closeModal() {
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    formWrap.innerHTML = '';
    if (lastTrigger) lastTrigger.focus();
  }

  document.addEventListener('click', function (e) {
    var btn = e.target.closest('.open-payment-modal');
    if (btn) { openModal(btn); return; }
    if (e.target === overlay) { closeModal(); }
  });

  if (closeBtn) closeBtn.addEventListener('click', closeModal);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && modal.classList.contains('is-open')) {
      closeModal();
    }
  });
}());
</script>
